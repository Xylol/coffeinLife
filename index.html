<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>coffeinLife</title>
  </head>
  <body>
    <div id="app">
      <h1>coffeinLife</h1>
      <div class="main-layout">
        <div class="left-col">
          <div class="input-row">
            <input type="number" id="mg-input" value="100" min="0" step="10" />
            <button id="add-now">+ now</button>
            <button id="settings-toggle" class="settings-btn" title="Settings">&#9881;</button>
          </div>
          <div class="input-row">
            <input type="text" id="time-input" placeholder="HH:MM" maxlength="5" />
            <button id="add-time">+ at time</button>
            <button id="reset-all" class="settings-btn" title="Reset all">&#8635;</button>
          </div>
          <input type="file" id="import-file" accept=".json" hidden />
          <table id="coffee-table">
            <thead><tr><th>Time</th><th>mg</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="graph-wrapper">
          <div id="sober-info" class="sober-info"></div>
          <canvas id="graph" width="600" height="300"></canvas>
        </div>
      </div>
      <div id="settings-overlay" class="overlay" hidden>
        <div class="overlay-box">
          <div class="overlay-header">
            <span>Settings</span>
            <button id="settings-close" class="settings-btn">&times;</button>
          </div>
          <label>Default mg <input type="number" id="default-mg-input" min="1" step="10" /></label>
          <label>Half-life <input type="number" id="half-life-input" min="0.5" step="0.5" /> h</label>
          <label>Caffeine-free threshold <input type="number" id="threshold-input" min="0" step="1" /> mg</label>
          <div class="overlay-actions">
            <button id="reset-settings">reset defaults</button>
            <button id="export-json">export</button>
            <button id="import-json">import</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
